<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>主持人 - 抢答系统</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ======== 创建房间视图 ======== */
    body { align-items: flex-start; background: linear-gradient(135deg, #0a0e27 0%, #141838 100%); }

    .create-view {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .create-view .card { max-width: 420px; }

    /* ======== 主机页面 ======== */
    .host-layout {
      width: 100%;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 0;
    }

    /* ---- 大屏展示区 ---- */
    .display-area {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .display-header {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 40px;
      position: relative;
    }

    .display-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: 2px;
    }

    .display-header .room-code {
      position: absolute;
      right: 0;
      font-size: 20px;
      color: var(--text-secondary);
      background: var(--bg-card);
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      letter-spacing: 2px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .copy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      padding: 2px 8px;
      line-height: 1;
      transition: all 0.2s;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.15); color: var(--text-primary); }

    /* ---- 抢答状态 ---- */
    .buzzer-status {
      text-align: center;
      flex: 0 0 auto;
      margin-bottom: 30px;
    }

    .status-text {
      font-size: 22px;
      color: var(--text-secondary);
      font-weight: 500;
      transition: all 0.3s;
    }

    .status-text.active { color: var(--accent-yellow); animation: pulse 1s infinite; }
    .status-text.locked { color: var(--accent-green); }
    .status-text.resolved { color: var(--accent-blue); }

    .timer-display {
      font-size: 96px;
      font-weight: 800;
      line-height: 1;
      margin: 10px 0;
      transition: color 0.3s;
    }

    .timer-display.running { color: var(--accent-yellow); }
    .timer-display.warning { color: var(--accent-red); animation: pulse 0.5s infinite; }
    .timer-display.idle { color: var(--text-secondary); }

    /* ---- 题目区块 ---- */
    .question-section {
      flex: 0 0 auto;
      margin-bottom: 20px;
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px 20px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .question-section.hidden { display: none; }
    .question-section .qs-label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .question-section .qs-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .question-section .qs-label-row .qs-label { margin-bottom: 0; }
    .question-section .qs-label-row .bank-label-btn {
      font-size: 12px;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.06);
      border: none;
      border-radius: 6px;
      padding: 2px 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .question-section .qs-label-row .bank-label-btn:hover {
      background: rgba(74,158,255,0.15);
      color: var(--accent-blue);
    }
    .question-section .qs-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-primary);
      border: 2px solid transparent;
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 15px;
      resize: vertical;
      min-height: 44px;
      max-height: 100px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .question-section .qs-input:focus {
      border-color: var(--accent-blue);
    }
    .question-section .qs-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .question-section .qs-actions .btn {
      flex: 1;
      padding: 8px 16px;
      font-size: 13px;
      width: auto;
    }
    .question-section .qs-preview {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 22px;
      font-weight: 600;
      color: var(--accent-yellow);
      line-height: 1.4;
      word-break: break-word;
      min-height: 32px;
    }
    .question-section .qs-preview.empty {
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 400;
    }
    .question-section .qs-answer-preview {
      margin-top: 6px;
      padding: 6px 10px;
      background: rgba(0, 230, 118, 0.1);
      border: 1px solid rgba(0, 230, 118, 0.2);
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      color: var(--accent-green);
    }
    .question-section .qs-answer-preview.hidden { display: none; }

    /* ---- 题库选取面板 ---- */
    .question-bank {
      margin-top: 12px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
      animation: fadeIn 0.2s ease;
    }
    .question-bank.hidden { display: none; }
    .question-bank .qb-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text-secondary);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-weight: 600;
    }
    .question-bank .qb-count { font-weight: 400; font-size: 12px; }
    .question-bank .qb-list {
      max-height: 220px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .question-bank .qb-list::-webkit-scrollbar { width: 4px; }
    .question-bank .qb-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    .question-bank .qb-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .question-bank .qb-item:last-child { border-bottom: none; }
    .question-bank .qb-item:hover { background: rgba(74,158,255,0.08); }
    .question-bank .qb-item.qb-used { opacity: 0.55; }
    .question-bank .qb-item.qb-used:hover { opacity: 0.8; }
    .question-bank .qb-item .qb-q {
      flex: 1;
      font-size: 14px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .question-bank .qb-item .qb-a {
      font-size: 12px;
      color: var(--accent-green);
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .question-bank .qb-empty {
      padding: 24px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
    }
    .question-bank .qb-loading {
      padding: 24px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
    }
    .question-bank .qb-pwd-row {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .question-bank .qb-pwd-input {
      flex: 1;
      padding: 6px 10px;
      background: var(--bg-primary);
      border: 2px solid transparent;
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .question-bank .qb-pwd-input:focus {
      border-color: var(--accent-blue);
    }
    .question-bank .qb-pwd-row .btn { width: auto; }

    /* ---- 选手列表 ---- */
    .contestants-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      flex: 1;
      align-content: center;
      justify-content: center;
    }

    .contestant-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 28px 36px;
      min-width: 200px;
      text-align: center;
      border: 3px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s ease;
      position: relative;
      animation: fadeIn 0.5s ease;
    }

    .contestant-card .name {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    .contestant-card .score {
      font-size: 56px;
      font-weight: 800;
      transition: all 0.3s;
    }

    .contestant-card .score-change {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: 800;
      pointer-events: none;
      animation: scoreFloat 1.2s ease forwards;
    }

    .contestant-card .score-change.positive { color: var(--accent-green); }
    .contestant-card .score-change.negative { color: var(--accent-red); }

    .contestant-card.buzzed {
      border-color: var(--accent-yellow);
      transform: scale(1.08);
      box-shadow: 0 0 40px rgba(255, 214, 0, 0.3);
      animation: glow 1.5s infinite;
    }

    .contestant-card.correct {
      border-color: var(--accent-green);
      box-shadow: 0 0 40px rgba(0, 230, 118, 0.4);
    }

    .contestant-card.wrong {
      border-color: var(--accent-red);
      box-shadow: 0 0 40px rgba(255, 23, 68, 0.4);
      animation: shake 0.5s ease;
    }

    /* ---- 选手在线状态指示器 ---- */
    .contestant-card .status-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      transition: background 0.3s;
    }
    .contestant-card .status-dot.online { background: var(--accent-green); box-shadow: 0 0 8px rgba(0, 230, 118, 0.6); }
    .contestant-card .status-dot.offline { background: #555; }

    .contestant-card .contestant-name-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .contestant-card .avatar-mini {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.1);
    }
    .contestant-card .avatar-mini-placeholder {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }

    .contestant-card .buzz-badge {
      display: none;
      position: absolute;
      top: -12px;
      right: -12px;
      background: var(--accent-yellow);
      color: #000;
      font-size: 14px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .contestant-card.buzzed .buzz-badge { display: block; }

    /* ---- 控制面板 ---- */
    .control-panel {
      background: var(--bg-secondary);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-left: 1px solid rgba(255, 255, 255, 0.06);
      overflow-y: auto;
    }

    .control-panel h2 {
      font-size: 18px;
      color: var(--text-secondary);
      font-weight: 600;
      margin-bottom: 4px;
      text-align: center;
    }

    .control-panel .btn { font-size: 15px; padding: 12px 20px; }

    .control-row {
      display: flex;
      gap: 8px;
    }
    .control-row .btn { flex: 1; }

    .timer-presets {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .timer-preset {
      padding: 6px 16px;
      background: var(--bg-primary);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .timer-preset:hover { border-color: var(--accent-blue); color: var(--text-primary); }
    .timer-preset.active { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(74, 158, 255, 0.1); }

    .section-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      margin-top: 8px;
    }

    .contestants-score-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .avatar-tiny {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.08);
      vertical-align: middle;
    }
    .avatar-tiny-placeholder {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      vertical-align: middle;
    }
    .score-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-primary);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
    }

    .score-row .name {
      flex: 1 1 auto;
      font-weight: 600;
      font-size: 14px;
      min-width: 50px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score-row .pts {
      font-size: 16px;
      font-weight: 700;
      min-width: 36px;
      text-align: center;
    }

    .score-row .adj-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .score-row .adj-btn:active { transform: scale(0.9); }
    .score-row .adj-btn.plus { background: rgba(0, 230, 118, 0.2); color: var(--accent-green); }
    .score-row .adj-btn.plus:hover { background: rgba(0, 230, 118, 0.35); }
    .score-row .adj-btn.minus { background: rgba(255, 23, 68, 0.2); color: var(--accent-red); }
    .score-row .adj-btn.minus:hover { background: rgba(255, 23, 68, 0.35); }
    .score-row .remove-btn {
      width: 28px; height: 28px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s;
      background: rgba(255, 255, 255, 0.08); color: var(--text-secondary); line-height: 1;
    }
    .score-row .remove-btn:hover { background: rgba(255, 23, 68, 0.3); color: var(--accent-red); }
    .score-row .remove-btn:active { transform: scale(0.9); }

    /* ---- 排名模块 ---- */
    .ranking-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ranking-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg-primary);
      border-radius: var(--radius-sm);
      transition: all 0.3s ease;
    }
    .ranking-item .rank {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
      background: rgba(255,255,255,0.06);
      color: var(--text-secondary);
    }
    .ranking-item .rank.gold { background: linear-gradient(135deg, #ffd700, #ffab00); color: #000; }
    .ranking-item .rank.silver { background: linear-gradient(135deg, #c0c0c0, #9e9e9e); color: #000; }
    .ranking-item .rank.bronze { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #fff; }
    .ranking-item .rname {
      flex: 1;
      font-weight: 600;
      font-size: 14px;
    }
    .ranking-item .rscore {
      font-size: 18px;
      font-weight: 800;
      min-width: 40px;
      text-align: right;
    }
    .ranking-item .rank-change {
      font-size: 12px;
      min-width: 24px;
      text-align: center;
    }
    .ranking-item .rank-change.up { color: var(--accent-green); }
    .ranking-item .rank-change.down { color: var(--accent-red); }
    .ranking-item .rank-change.same { color: var(--text-secondary); }
    .ranking-empty {
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
      padding: 12px;
    }

    .history-log {
      background: var(--bg-primary);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      max-height: 120px;
      overflow-y: auto;
      font-size: 13px;
    }

    .history-log .entry {
      color: var(--text-secondary);
      padding: 4px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .history-log .entry:last-child { border-bottom: none; }

    .hidden { display: none !important; }

    /* ---- 已有房间列表 ---- */
    .room-list-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg-primary);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    .room-list-item:hover {
      border-color: rgba(255,255,255,0.1);
    }
    .room-list-item .info-block {
      flex: 1;
      min-width: 0;
    }
    .room-list-item .code {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .room-list-item .code .copy-btn {
      font-size: 11px;
      padding: 0 5px;
      line-height: 20px;
      opacity: 0.5;
    }
    .room-list-item .code .copy-btn:hover { opacity: 1; }
    /* 已有房间列表滚动 */
    #existingRoomList {
      max-height: 280px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    #existingRoomList::-webkit-scrollbar { width: 4px; }
    #existingRoomList::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    .room-list-item .host {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .room-list-item .info {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .room-list-item .btn-sm {
      padding: 6px 14px;
      font-size: 13px;
      width: auto;
      border-radius: 8px;
      white-space: nowrap;
    }
    .room-list-item .enter-btn {
      background: rgba(74, 158, 255, 0.15);
      color: var(--accent-blue);
      border: 1px solid rgba(74, 158, 255, 0.3);
    }
    .room-list-item .enter-btn:hover {
      background: rgba(74, 158, 255, 0.3);
    }
    .room-list-item .delete-btn {
      background: rgba(255, 23, 68, 0.1);
      color: var(--accent-red);
      border: 1px solid rgba(255, 23, 68, 0.2);
    }
    .room-list-item .delete-btn:hover {
      background: rgba(255, 23, 68, 0.25);
    }
    .room-list-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    @media (max-width: 768px) {
      .host-layout { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
      .display-area { padding: 16px; }
      .display-header { flex-direction: column; gap: 6px; margin-bottom: 20px; }
      .display-header h1 { font-size: 20px; }
      .display-header .room-code { font-size: 16px; }
      .timer-display { font-size: 56px; }
      .contestant-card { padding: 16px 24px; min-width: 140px; }
      .contestant-card .name { font-size: 20px; }
      .contestant-card .score { font-size: 36px; }
      .control-panel { padding: 16px; }
    }
  </style>
</head>
<body>
  {{LOGO}}
  <!-- ===== 创建房间视图 ===== -->
  <div class="create-view" id="createView">
    <div style="text-align:center; margin-bottom: 30px; animation: fadeIn 0.6s ease;">
      <div style="font-size: 48px; line-height: 1; margin-bottom: 8px;">🏆</div>
      <h1 style="font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #4a9eff, #7c4dff, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">创建房间</h1>
      <p style="color: var(--text-secondary); margin-top: 8px; font-size: 15px;">创建抢答房间，选手扫码加入</p>
    </div>
    <div class="card" style="animation: slideUp 0.5s ease;">
      <div class="form-group">
        <label>比赛名称</label>
        <input class="form-input" id="gameNameInput" type="text" placeholder="输入比赛名称" maxlength="10">
      </div>
      <button class="btn btn-primary" id="createRoomBtn">🎯 创建房间</button>
    </div>

    <!-- Logo上传（创建房间视图） -->
    <div style="text-align:center; margin-top: 16px; font-size:13px;">
      <span id="logoUploadLink" onclick="document.getElementById('logoFileInput').click()" style="color:var(--text-secondary);cursor:pointer;text-decoration:none;border:1px dashed rgba(255,255,255,0.1);border-radius:8px;padding:6px 16px;">🖼 上传企业Logo</span>
    </div>
    <input type="file" id="logoFileInput" accept="image/png,image/jpeg" style="display:none">

    <!-- 已有房间列表（重启后可重新接入） -->
    <div class="card" style="animation: slideUp 0.55s ease; margin-top: 16px; padding: 20px 24px; display:none;" id="existingRoomsCard">
      <div style="font-size:14px; color: var(--text-secondary); font-weight:600; margin-bottom:12px;">📂 已有房间（重启服务器后仍在）</div>
      <div id="existingRoomList"></div>
    </div>
    <div style="margin-top:24px;font-size:13px;text-align:center;">
      <a href="/" style="color:var(--accent-blue);text-decoration:none;">← 返回首页</a>
    </div>
  </div>

  <!-- ===== 主持人大屏视图 ===== -->
  <div class="host-layout hidden" id="dashboardView">
    <div class="display-area">
      <div class="display-header">
        <h1 id="roomTitle">🏆 知识竞赛</h1>
        <div class="room-code"><span id="roomCodeDisplay">——</span><button class="copy-btn" id="copyRoomCodeBtn" onclick="copyText(document.getElementById('roomCodeDisplay').textContent.replace('房间: ',''), this)">📋</button></div>
      </div>

      <div class="buzzer-status">
        <div class="status-text" id="statusText">等待开始抢答</div>
        <div class="timer-display idle" id="timerDisplay">--</div>
      </div>

      <!-- 题目输入+发布+展示 -->
      <div class="question-section" id="questionSection">
        <div class="qs-label-row">
          <div class="qs-label">📝 当前题目</div>
          <button class="bank-label-btn" id="bankBtn">📚 题库</button>
        </div>
        <textarea class="qs-input" id="questionInput" placeholder="输入题目文本..." rows="2"></textarea>
        <div class="qs-label" style="margin-top:8px;">💡 正确答案</div>
        <textarea class="qs-input" id="answerInput" placeholder="输入正确答案（判分后自动公布）..." rows="1" style="min-height:36px;"></textarea>
        <div class="qs-actions">
          <button class="btn btn-primary" id="publishQuestionBtn" style="flex:2;">📤 发布题目</button>
          <button class="btn btn-outline" id="clearQuestionBtn">✕ 清除</button>
        </div>
        <div class="qs-preview empty" id="questionPreview">暂无题目</div>
        <div class="qs-answer-preview hidden" id="answerPreview"></div>

        <!-- 题库选取面板 -->
        <div class="question-bank hidden" id="questionBank">
          <div class="qb-header"><span>📚 题库</span><span class="qb-count" id="qbCount">0 题</span></div>
          <div class="qb-pwd-row" id="qbPwdRow">
            <input class="qb-pwd-input" id="qbPwdInput" type="password" placeholder="输入管理密码" autocomplete="off">
            <button class="btn-sm btn-primary" id="qbUnlockBtn" style="padding:4px 12px;font-size:12px;width:auto;">验证</button>
          </div>
          <div class="qb-list hidden" id="qbList">
            <div class="qb-loading">加载中...</div>
          </div>
        </div>
      </div>

      <div class="contestants-grid" id="contestantsGrid">
        <div style="color: var(--text-secondary); font-size: 18px; text-align: center; width: 100%;">
          等待选手加入...<br>
          <span style="font-size:14px;margin-top:8px;display:inline-block;">选手在手机打开本页 → 输入房间号加入</span>
        </div>
      </div>
    </div>

    <div class="control-panel">
      <h2>🎮 控制面板</h2>

      <div class="section-label">倒计时</div>
      <div class="timer-presets" id="timerPresets">
        <span class="timer-preset" data-t="5">5s</span>
        <span class="timer-preset active" data-t="10">10s</span>
        <span class="timer-preset" data-t="15">15s</span>
        <span class="timer-preset" data-t="20">20s</span>
        <span class="timer-preset" data-t="30">30s</span>
      </div>

      <div class="section-label">抢答控制</div>
      <button class="btn btn-primary" id="startBuzzerBtn">🚀 开始抢答</button>

      <div class="control-row">
        <button class="btn btn-green" id="correctBtn">✅ 正确 (+10)</button>
        <button class="btn btn-red" id="wrongBtn">❌ 错误 (-5)</button>
      </div>

      <button class="btn btn-outline" id="nextBtn">⏭️ 下一题</button>

      <div class="section-label">大屏控制</div>
      <button class="btn btn-outline" id="qrToggleBtn" style="font-size:13px;">📱 显示二维码</button>

      <div class="section-label">选手分数</div>
      <div class="contestants-score-list" id="scoreList">
        <div style="color: var(--text-secondary); font-size: 13px; text-align: center;">暂无选手</div>
      </div>

      <div class="section-label">抢答记录</div>
      <div class="history-log" id="historyLog">
        <div class="entry" style="color: var(--text-secondary);">暂无记录</div>
      </div>

      <button class="btn btn-outline btn-sm" id="backToRoomsBtn" style="margin-top:8px; font-size:13px;">← 返回房间列表</button>
      <div style="margin-top:6px;font-size:12px;text-align:center;">
        <a href="/" style="color:var(--accent-blue);text-decoration:none;">← 返回首页</a>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/socket-client.js"></script>
  <script>
    // ======== 同一页面创建房间 → 大屏，无需跳转 ========

    let selectedTimer = 10;
    let roomCode = null;
    let logEntries = [];

    // ---- Logo 上传 ----
    $('#logoFileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          // Logo 保持宽高比，最大宽度 400px
          let w = img.width, h = img.height;
          if (w > 400) { h = Math.round(h * 400 / w); w = 400; }
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          const dataUrl = canvas.toDataURL('image/png', 0.8);
          fetch('/api/upload-logo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: dataUrl })
          }).then(r => r.json()).then(res => {
            if (res.ok) {
              showToast('✅ Logo已更新，刷新页面查看', 'success');
              // 立即更新页面上已有的logo
              const logos = document.querySelectorAll('.brand-logo');
              logos.forEach(l => { l.src = res.logoUrl; l.style.display = ''; });
            } else {
              showToast(res.error || '上传失败');
            }
          }).catch(() => showToast('上传失败，请重试'));
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    // ---- 创建房间 ----
    $('#createRoomBtn').addEventListener('click', () => {
      const gameName = $('#gameNameInput').value.trim() || '知识竞赛';
      $('#createRoomBtn').disabled = true;
      $('#createRoomBtn').textContent = '创建中...';

      // 安全超时：防止按钮卡在"创建中"状态
      const safetyTimer = setTimeout(() => {
        $('#createRoomBtn').disabled = false;
        $('#createRoomBtn').textContent = '🎯 创建房间';
        showToast('创建超时，请重试', 'error');
      }, 8000);

      socket.emit('create-room', { gameName }, (res) => {
        clearTimeout(safetyTimer);
        if (!res.ok) {
          $('#createRoomBtn').disabled = false;
          $('#createRoomBtn').textContent = '🎯 创建房间';
          return showToast(res.error);
        }

        roomCode = res.roomCode;

        // 认领主持人
        socket.emit('claim-host', { roomCode }, (claimRes) => {
          $('#createRoomBtn').disabled = false;
          $('#createRoomBtn').textContent = '🎯 创建房间';

          if (!claimRes.ok) {
            showToast('认领失败: ' + claimRes.error);
            return;
          }

          // 成功！切换到仪表盘视图
          $('#createView').classList.add('hidden');
          $('#dashboardView').classList.remove('hidden');

          // 更新房间信息
          $('#roomTitle').textContent = '🏆 ' + gameName;
          $('#roomCodeDisplay').textContent = '房间: ' + roomCode;

          // 设置 URL（不刷新页面）
          history.replaceState(null, '', '/host?room=' + roomCode);

          // 检查是否有从题库选用的题目
          loadFromQuestionBank();

          showToast('🎉 房间 ' + roomCode + ' 已创建！', 'success');
        });
      });
    });

    // ---- 查询已有房间（服务器重启后，之前的房间可重新接入） ----
    function refreshRoomList() {
      socket.emit('list-rooms', {}, (res) => {
        if (res.ok && res.rooms.length > 0) {
          const list = $('#existingRoomList');
          list.innerHTML = res.rooms.map(r => `
            <div class="room-list-item" data-code="${r.id}">
              <div class="info-block">
                <div class="code">${r.id}<button class="copy-btn" onclick="event.stopPropagation();copyText('${r.id}',this)" title="复制房间号">📋</button></div>
                <div class="host">🏆 ${r.gameName} · ${r.playerCount} 位选手</div>
              </div>
              <div class="room-list-actions">
                <button class="btn-sm enter-btn">进入</button>
                <button class="btn-sm delete-btn">删除</button>
              </div>
            </div>
          `).join('');
          list.querySelectorAll('.enter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              const code = btn.closest('.room-list-item').dataset.code;
              joinExistingRoom(code);
            });
          });
          list.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              const code = btn.closest('.room-list-item').dataset.code;
              if (confirm('确定要删除房间 ' + code + ' 吗？选手数据将丢失。')) {
                socket.emit('delete-room', { roomCode: code }, (res) => {
                  if (res.ok) {
                    showToast('房间 ' + code + ' 已删除');
                    refreshRoomList();
                  } else {
                    showToast(res.error);
                  }
                });
              }
            });
          });
          $('#existingRoomsCard').style.display = 'block';
        } else {
          $('#existingRoomsCard').style.display = 'none';
        }
      });
    }
    refreshRoomList();

    function joinExistingRoom(code) {
      socket.emit('get-room', { roomCode: code }, (res) => {
        if (!res.ok) return showToast('房间不可用');
        roomCode = code;
        socket.emit('claim-host', { roomCode }, (cr) => {
          if (cr.ok) {
            $('#createView').classList.add('hidden');
            $('#dashboardView').classList.remove('hidden');
            $('#roomTitle').textContent = `🏆 ${res.room.gameName}`;
            $('#roomCodeDisplay').textContent = '房间: ' + roomCode;
            history.replaceState(null, '', '/host?room=' + roomCode);
            showToast('🔗 已重新进入房间', 'success');
            loadFromQuestionBank();
            renderContestants();
            renderScoreList();
            renderRanking();
          } else {
            showToast('认领失败: ' + cr.error);
          }
        });
      });
    }

    // (URL 带 room 参数时，直接从 dashboard 模式启动)
    const urlParams = new URLSearchParams(location.search);
    const urlRoom = urlParams.get('room');
    if (urlRoom) {
      joinExistingRoom(urlRoom);
    }

    // ---- 主持人名称回车 ----
    $('#gameNameInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') $('#createRoomBtn').click();
    });

    // ======== 倒计时预设 ========
    $$('.timer-preset').forEach(el => {
      el.addEventListener('click', () => {
        $$('.timer-preset').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
        selectedTimer = parseInt(el.dataset.t);
      });
    });

    // ======== 开始抢答 ========
    $('#startBuzzerBtn').addEventListener('click', () => {
      if (!roomCode) return;
      $('#startBuzzerBtn').disabled = true;
      socket.emit('start-buzzer', { roomCode, timer: selectedTimer }, (res) => {
        $('#startBuzzerBtn').disabled = false;
        if (!res.ok) showToast(res.error);
      });
    });

    // ======== 判对 ========
    $('#correctBtn').addEventListener('click', () => {
      if (!roomCode) return;
      socket.emit('judge-correct', { roomCode, points: 10 }, (res) => {
        if (!res.ok) showToast(res.error);
      });
    });

    // ======== 判错 ========
    $('#wrongBtn').addEventListener('click', () => {
      if (!roomCode) return;
      socket.emit('judge-wrong', { roomCode, points: -5 }, (res) => {
        if (!res.ok) showToast(res.error);
      });
    });

    // ======== 下一题 ========
    $('#nextBtn').addEventListener('click', () => {
      if (!roomCode) return;
      socket.emit('next-question', { roomCode }, (res) => {
        if (!res.ok) return showToast(res.error);
        // 清空题目和答案输入框
        $('#questionInput').value = '';
        $('#answerInput').value = '';
        $('#questionPreview').textContent = '暂无题目';
        $('#questionPreview').className = 'qs-preview empty';
        $('#answerPreview').textContent = '';
        $('#answerPreview').className = 'qs-answer-preview hidden';
        currentQuestionId = null;
      });
    });

    // ======== 题目发布 ========
    $('#publishQuestionBtn').addEventListener('click', () => {
      if (!roomCode) return;
      const text = $('#questionInput').value.trim();
      const answer = $('#answerInput').value.trim();
      socket.emit('publish-question', { roomCode, question: text, answer, questionId: currentQuestionId }, (res) => {
        if (!res.ok) return showToast(res.error);
        // 更新本地答案预览
        updateQuestionDisplay(text, answer);
        currentQuestionId = null;
      });
    });

    $('#clearQuestionBtn').addEventListener('click', () => {
      if (!roomCode) return;
      socket.emit('publish-question', { roomCode, question: '', answer: '' }, (res) => {
        if (!res.ok) return showToast(res.error);
        updateQuestionDisplay('', '');
        currentQuestionId = null;
      });
    });

    // ======== 大屏二维码控制 ========
    let qrVisible = false;
    $('#qrToggleBtn').addEventListener('click', () => {
      if (!roomCode) return;
      qrVisible = !qrVisible;
      socket.emit('toggle-qr', { roomCode, show: qrVisible }, (res) => {
        if (!res.ok) { qrVisible = !qrVisible; return showToast(res.error); }
        $('#qrToggleBtn').textContent = qrVisible ? '📱 隐藏二维码' : '📱 显示二维码';
      });
    });

    socket.on('question-update', ({ question }) => {
      // question-update 不含答案（答案随 judge-result 公布）
      // 保持当前答案显示不变
      const curAnswer = $('#answerPreview').classList.contains('hidden') ? '' : $('#answerPreview').textContent.replace('💡 正确答案：', '');
      updateQuestionDisplay(question, curAnswer);
      if (question && question.trim()) playSound('publish');
    });

    // 从 sessionStorage 读取题库选用的题目（由 questions.html 的"选用"写入）
    function loadFromQuestionBank() {
      const q = sessionStorage.getItem('use_question');
      const a = sessionStorage.getItem('use_answer');
      if (q) {
        updateQuestionDisplay(q, a);
        sessionStorage.removeItem('use_question');
        sessionStorage.removeItem('use_answer');
      }
      currentQuestionId = null; // 非内置题库选择，不跟踪 ID
    }

    function updateQuestionDisplay(question, answer) {
      const preview = $('#questionPreview');
      const input = $('#questionInput');
      const answerPreview = $('#answerPreview');
      const answerInput = $('#answerInput');

      if (question && question.trim()) {
        preview.textContent = question;
        preview.className = 'qs-preview';
        input.value = question;
      } else {
        preview.textContent = '暂无题目';
        preview.className = 'qs-preview empty';
        input.value = '';
      }

      // 答案展示（host 自己可见，不广播给客户端）
      answerInput.value = answer || '';
      if (answer && answer.trim()) {
        answerPreview.textContent = '💡 正确答案：' + answer;
        answerPreview.className = 'qs-answer-preview';
      } else {
        answerPreview.textContent = '';
        answerPreview.className = 'qs-answer-preview hidden';
      }
    }

    // ======== 题库选取（只需验证一次） ========
    let bankQuestions = [];
    let bankPassword = '';
    let currentQuestionId = null;
    let usedQuestionIds = [];

    $('#bankBtn').addEventListener('click', () => {
      const bank = $('#questionBank');
      if (bank.classList.contains('hidden')) {
        bank.classList.remove('hidden');
        if (bankPassword) {
          // 已验证过，直接刷新题库
          $('#qbPwdRow').classList.add('hidden');
          $('#qbList').classList.remove('hidden');
          refreshQuestionBank();
        } else {
          // 未验证，显示密码输入
          $('#qbPwdRow').classList.remove('hidden');
          $('#qbList').classList.add('hidden');
          $('#qbPwdInput').value = '';
          $('#qbPwdInput').focus();
        }
      } else {
        bank.classList.add('hidden');
      }
    });

    $('#qbPwdInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') $('#qbUnlockBtn').click();
    });

    $('#qbUnlockBtn').addEventListener('click', () => {
      const password = $('#qbPwdInput').value.trim();
      if (!password) return showToast('请输入管理密码');
      if (!roomCode) return;

      $('#qbUnlockBtn').disabled = true;
      $('#qbUnlockBtn').textContent = '验证中...';
      $('#qbList').classList.remove('hidden');
      $('#qbList').innerHTML = '<div class="qb-loading">验证中...</div>';

      socket.emit('get-questions', { roomCode, password }, (res) => {
        $('#qbUnlockBtn').disabled = false;
        $('#qbUnlockBtn').textContent = '验证';

        if (!res.ok) {
          $('#qbList').innerHTML = '<div class="qb-empty">❌ 密码错误</div>';
          return showToast(res.error);
        }

        // 验证成功，记住密码、隐藏密码行、显示题目
        bankPassword = password;
        $('#qbPwdRow').classList.add('hidden');
        bankQuestions = res.questions || [];
        usedQuestionIds = res.usedQuestionIds || [];
        renderQuestionBank();
      });
    });

    function refreshQuestionBank() {
      if (!roomCode || !bankPassword) return;
      const list = $('#qbList');
      list.innerHTML = '<div class="qb-loading">加载中...</div>';
      socket.emit('get-questions', { roomCode, password: bankPassword }, (res) => {
        if (!res.ok) return;
        bankQuestions = res.questions || [];
        usedQuestionIds = res.usedQuestionIds || [];
        renderQuestionBank();
      });
    }

    function renderQuestionBank() {
      const list = $('#qbList');
      const count = $('#qbCount');
      count.textContent = bankQuestions.length + ' 题';

      if (!bankQuestions || bankQuestions.length === 0) {
        list.innerHTML = '<div class="qb-empty">📭 暂无题目，请前往 <a href="/questions?room=' + roomCode + '" style="color:var(--accent-blue);text-decoration:none;">题库管理</a> 添加</div>';
        return;
      }

      list.innerHTML = bankQuestions.map(q => {
        const used = usedQuestionIds.includes(q.id);
        return `
          <div class="qb-item${used ? ' qb-used' : ''}" data-id="${q.id}">
            <span class="qb-q">${used ? '✅ ' : ''}${escapeHtml(q.question)}</span>
            <span class="qb-a">${escapeHtml(q.answer) || '—'}</span>
          </div>
        `;
      }).join('');

      // 点击题目自动填入输入框
      list.querySelectorAll('.qb-item').forEach(item => {
        item.addEventListener('click', () => {
          const id = item.dataset.id;
          const q = bankQuestions.find(bq => bq.id === id);
          if (!q) return;
          currentQuestionId = id;
          $('#questionInput').value = q.question;
          $('#answerInput').value = q.answer || '';
          $('#questionBank').classList.add('hidden');
          showToast('✅ 已选用题目，点击"发布题目"发送', 'success');
        });
      });
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text || '';
      return d.innerHTML;
    }

    // ======== 返回房间列表 ========
    $('#backToRoomsBtn').addEventListener('click', () => {
      if (!roomCode) return;
      // 询问确认
      if (!confirm('返回房间列表后，当前大屏将断开。选手可继续留在房间等待。')) return;
      // 通知服务端释放主持人权限
      const code = roomCode;
      socket.emit('leave-host', { roomCode }, () => {
        // 不管结果如何，继续返回
      });
      roomCode = null;
      logEntries = [];
      $('#dashboardView').classList.add('hidden');
      $('#createView').classList.remove('hidden');
      history.replaceState(null, '', '/host');
      refreshRoomList();
      showToast('已返回房间列表', 'success');
    });

    // ======== 断线自动重连 ========
    socket.on('connect', () => {
      if (roomCode) {
        // 服务器重启后自动重新认领
        socket.emit('claim-host', { roomCode }, (res) => {
          if (res.ok) {
            showToast('🔗 已重新连接到房间', 'success');
            // 刷新所有信息
            renderContestants();
            renderScoreList();
            renderRanking();
          } else {
            showToast('⚠️ 房间连接失败，可能需要重新创建');
          }
        });
      }
    });

    // ======== Socket 事件处理 ========

    socket.on('contestant-joined', ({ contestant }) => {
      playSound('join');
      renderContestants();
      renderScoreList();
      renderRanking();
      showToast(`🎉 ${contestant.name} 加入！`, 'success');
    });

    socket.on('contestant-left', () => {
      renderContestants();
      renderScoreList();
      renderRanking();
    });

    socket.on('contestant-rejoined', ({ name }) => {
      playSound('join');
      renderContestants();
      renderScoreList();
      renderRanking();
      showToast(`🔄 ${name} 重新接入`, 'success');
    });

    socket.on('contestant-status', ({ contestantId, connected }) => {
      // 实时更新卡片上的连接状态点，不用全量刷新
      const cards = $$('.contestant-card');
      cards.forEach(card => {
        if (card.dataset.id === contestantId) {
          const dot = card.querySelector('.status-dot');
          const hint = card.querySelector('.status-hint');
          if (dot) {
            dot.className = 'status-dot ' + (connected ? 'online' : 'offline');
          }
          if (hint) {
            hint.textContent = connected ? '● 在线' : '○ 离线';
          }
        }
      });
      // 也更新控制面板的选手列表
      renderScoreList();
      renderRanking();
    });

    socket.on('buzzer-state', ({ state, winner, remaining }) => {
      updateBuzzerUI(state, winner, remaining);
    });

    socket.on('buzz-result', ({ winnerId, winnerName }) => {
      highlightContestant(winnerId, 'buzzed');
      playSound('buzz');
      addLogEntry(`🏆 ${winnerName} 抢答成功`);
    });

    socket.on('judge-result', ({ correct, contestantId, delta, answer }) => {
      highlightContestant(contestantId, correct ? 'correct' : 'wrong');
      playSound(correct ? 'correct' : 'wrong');
      let log = `${correct ? '✅ 正确 +' : '❌ 错误 '}${delta > 0 ? '+' : ''}${delta}`;
      if (answer) log += `  💡 ${answer}`;
      addLogEntry(log);
    });

    socket.on('score-update', () => {
      renderContestants();
      renderScoreList();
      renderRanking();
    });

    socket.on('avatar-updated', () => {
      renderContestants();
      renderScoreList();
      renderRanking();
    });

    socket.on('timer-tick', ({ remaining }) => {
      updateTimer(remaining);
    });

    socket.on('host-disconnected', () => {
      showToast('⚠️ 与服务器连接断开', 'error');
    });

    // ======== UI 更新 ========

    function updateBuzzerUI(state, winner, remaining) {
      const statusEl = $('#statusText');
      const timerEl = $('#timerDisplay');
      switch (state) {
        case 'open':
          statusEl.textContent = '🔴 抢答中！';
          statusEl.className = 'status-text active';
          timerEl.className = 'timer-display running';
          updateTimer(remaining);
          break;
        case 'locked':
          statusEl.textContent = `🏆 ${winner?.name || '选手'} 抢到！`;
          statusEl.className = 'status-text locked';
          timerEl.className = 'timer-display idle';
          timerEl.textContent = '--';
          break;
        case 'resolved':
          statusEl.textContent = '⏳ 等待下一题...';
          statusEl.className = 'status-text resolved';
          timerEl.className = 'timer-display idle';
          timerEl.textContent = '--';
          break;
        default:
          statusEl.textContent = '⏸️ 等待开始抢答';
          statusEl.className = 'status-text';
          timerEl.className = 'timer-display idle';
          timerEl.textContent = '--';
          break;
      }
    }

    function updateTimer(remaining) {
      const timerEl = $('#timerDisplay');
      if (remaining === undefined || remaining === null) return;
      timerEl.textContent = remaining;
      timerEl.className = remaining <= 3 ? 'timer-display warning' : 'timer-display running';
    }

    function renderContestants() {
      if (!roomCode) return;
      socket.emit('get-room', { roomCode }, (res) => {
        if (!res.ok) return;
        // 同步更新题目展示
        if (res.room.currentQuestion !== undefined) {
          updateQuestionDisplay(res.room.currentQuestion, res.room.currentAnswer);
        }
        const grid = $('#contestantsGrid');
        const contestants = res.room.contestants;
        if (!contestants || contestants.length === 0) {
          grid.innerHTML = '<div style="color: var(--text-secondary); font-size: 18px; text-align: center; width: 100%;">等待选手加入...<br><span style="font-size:14px;margin-top:8px;display:inline-block;">选手在手机打开本页 → 输入房间号加入</span></div>';
          return;
        }
        grid.innerHTML = contestants.map(c => {
          const avatarHtml = c.avatar
            ? `<img class="avatar-mini" src="${c.avatar}" alt="">`
            : `<span class="avatar-mini-placeholder" style="background:${c.color}33;color:${c.color}">${c.name.charAt(0)}</span>`;
          return `
          <div class="contestant-card" data-id="${c.id}">
            <div class="contestant-name-row">
              <span class="status-dot ${c.connected ? 'online' : 'offline'}"></span>
              ${avatarHtml}
              <span class="name" style="color: ${c.color}">${c.name}</span>
            </div>
            <div class="score" style="color: ${c.color}" id="score-${c.id}">${c.score}</div>
            <div class="buzz-badge">🏆 抢到</div>
            <div class="status-hint" style="font-size:12px;color:var(--text-secondary);margin-top:6px;">${c.connected ? '● 在线' : '○ 离线'}</div>
          </div>`;
        }).join('');
      });
    }

    function highlightContestant(contestantId, type) {
      const cards = $$('.contestant-card');
      cards.forEach(c => {
        c.classList.remove('buzzed', 'correct', 'wrong');
        if (c.dataset.id === contestantId) {
          c.classList.add(type);
          if (type === 'correct' || type === 'wrong') {
            setTimeout(() => c.classList.remove(type), 2000);
          }
        }
      });
    }

    function renderScoreList() {
      if (!roomCode) return;
      socket.emit('get-room', { roomCode }, (res) => {
        if (!res.ok) return;
        const list = $('#scoreList');
        const contestants = res.room.contestants;
        if (!contestants || contestants.length === 0) {
          list.innerHTML = '<div style="color: var(--text-secondary); font-size: 13px; text-align: center;">暂无选手</div>';
          return;
        }
        list.innerHTML = contestants.map(c => {
          const avHtml = c.avatar
            ? `<img class="avatar-tiny" src="${c.avatar}" alt="">`
            : `<span class="avatar-tiny-placeholder" style="background:${c.color}33;color:${c.color}">${c.name.charAt(0)}</span>`;
          return `
          <div class="score-row">
            ${avHtml}
            <span class="name" style="color: ${c.color}">${c.name}</span>
            <button class="adj-btn minus" data-id="${c.id}" data-delta="-5">−5</button>
            <span class="pts">${c.score}</span>
            <button class="adj-btn plus" data-id="${c.id}" data-delta="5">+5</button>
            <button class="adj-btn plus" data-id="${c.id}" data-delta="10">+10</button>
            <button class="remove-btn" data-id="${c.id}" title="移除选手">✕</button>
          </div>`;
        }).join('');
        list.querySelectorAll('.adj-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.id;
            const delta = parseInt(btn.dataset.delta);
            socket.emit('adjust-score', { roomCode, contestantId: id, delta }, (res) => {
              if (!res.ok) showToast(res.error);
            });
          });
        });
        list.querySelectorAll('.remove-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.id;
            if (confirm('确定移除该选手吗？')) {
              socket.emit('remove-contestant', { roomCode, contestantId: id }, (res) => {
                if (!res.ok) showToast(res.error);
              });
            }
          });
        });
      });
    }

    // ---- 排名缓存（用于判断升降） ----
    let prevRankings = {};

    function renderRanking() {
      if (!roomCode) return;
      const list = $('#rankingList');
      if (!list) return;
      socket.emit('get-room', { roomCode }, (res) => {
        if (!res.ok) return;
        const ranked = [...res.room.contestants].sort((a, b) => b.score - a.score);
        if (!ranked || ranked.length === 0) {
          list.innerHTML = '<div class="ranking-empty">暂无选手</div>';
          return;
        }

        // 计算排名变化
        const newPrev = {};
        list.innerHTML = ranked.map((c, i) => {
          const rankNum = i + 1;
          let rankClass = '';
          if (rankNum === 1) rankClass = 'gold';
          else if (rankNum === 2) rankClass = 'silver';
          else if (rankNum === 3) rankClass = 'bronze';

          let rankEmoji = rankNum === 1 ? '🥇' : rankNum === 2 ? '🥈' : rankNum === 3 ? '🥉' : rankNum;

          // 排名变化箭头
          const prevRank = prevRankings[c.id];
          newPrev[c.id] = rankNum;
          let changeHtml = '';
          if (prevRank !== undefined) {
            if (prevRank > rankNum) changeHtml = '<span class="rank-change up">↑</span>';
            else if (prevRank < rankNum) changeHtml = '<span class="rank-change down">↓</span>';
            else changeHtml = '<span class="rank-change same">−</span>';
          }

          const avHtml = c.avatar
            ? `<img class="avatar-tiny" src="${c.avatar}" alt="">`
            : `<span class="avatar-tiny-placeholder" style="background:${c.color}33;color:${c.color}">${c.name.charAt(0)}</span>`;
          return `
            <div class="ranking-item">
              <div class="rank ${rankClass}">${rankEmoji}</div>
              ${avHtml}
              <span class="rname" style="color:${c.color}">${c.name}</span>
              <span class="rscore" style="color:${c.color}">${c.score}</span>
              ${changeHtml}
            </div>
          `;
        }).join('');
        prevRankings = newPrev;
      });
    }

    function addLogEntry(text) {
      logEntries.push(text);
      if (logEntries.length > 50) logEntries.shift();
      const log = $('#historyLog');
      log.innerHTML = logEntries.map(e => `<div class="entry">${e}</div>`).join('');
      log.scrollTop = log.scrollHeight;
    }
  </script>
</body>
</html>
