<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电视知识竞赛抢答系统</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .landing-view {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #0a0e27 0%, #141838 50%, #1a1040 100%);
    }

    .landing-logo {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeIn 0.8s ease;
    }
    .landing-logo .icon {
      font-size: 64px;
      line-height: 1;
      margin-bottom: 12px;
    }
    .landing-logo h1 {
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #4a9eff, #7c4dff, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    .landing-logo .subtitle {
      color: var(--text-secondary);
      font-size: 16px;
      letter-spacing: 1px;
    }

    .role-cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      animation: slideUp 0.6s ease;
      margin-bottom: 16px;
    }
    .role-card.q-card {
      border-color: rgba(124, 77, 255, 0.2);
      background: rgba(124, 77, 255, 0.06);
    }
    .role-card.q-card:hover {
      border-color: #7c4dff;
      box-shadow: 0 12px 40px rgba(124, 77, 255, 0.15);
    }

    .role-card {
      background: var(--bg-secondary);
      border: 2px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radius);
      padding: 36px 32px;
      width: 220px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .role-card:hover {
      border-color: var(--accent-blue);
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(74, 158, 255, 0.15);
    }
    .role-card:active {
      transform: translateY(-2px);
    }
    .role-card .emoji {
      font-size: 48px;
      line-height: 1;
    }
    .role-card .title {
      font-size: 20px;
      font-weight: 700;
    }
    .role-card .desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .landing-footer {
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.8;
      animation: fadeIn 1s ease;
    }
    .landing-footer a {
      color: var(--accent-blue);
      text-decoration: none;
    }
    .landing-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .landing-logo h1 { font-size: 26px; }
      .landing-logo .icon { font-size: 48px; }
      .role-cards { flex-direction: column; gap: 16px; align-items: center; }
      .role-card { width: 100%; max-width: 300px; padding: 24px 20px; }
    }
    @media (max-width: 400px) {
      .landing-logo { margin-bottom: 32px; }
      .landing-logo h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="landing-view">
    <div class="landing-logo">
      <div class="icon">🎯</div>
      <h1>电视知识竞赛抢答系统</h1>
      <div class="subtitle">主持人控制大屏 · 选手手机抢答 · 实时计分排名</div>
    </div>

    <div class="role-cards">
      <a class="role-card" href="/host">
        <div class="emoji">🏆</div>
        <div class="title">主持人</div>
        <div class="desc">创建并管理抢答房间<br>开始 / 判分 / 下一题</div>
      </a>
      <a class="role-card" href="/player">
        <div class="emoji">📱</div>
        <div class="title">选手加入</div>
        <div class="desc">输入房间号加入抢答<br>手机端大按钮抢答</div>
      </a>
      <a class="role-card" href="/screen">
        <div class="emoji">📺</div>
        <div class="title">大屏展示</div>
        <div class="desc">投影比赛实况到大屏<br>实时排名一目了然</div>
      </a>
      <a class="role-card q-card" href="/questions">
        <div class="emoji">📚</div>
        <div class="title">题库管理</div>
        <div class="desc">预先录入题目和答案<br>支持 CSV 批量导入</div>
      </a>
    </div>

    <div class="landing-footer">
      <strong>使用说明：</strong>电脑打开 <strong>/host</strong> 做主持人 · 手机打开 <strong>/player</strong> 加入抢答 · 电视投屏用 <strong>/screen</strong><br>
      题库管理在 <strong>/questions</strong> · 需要管理密码<br>
      确保所有设备在 <strong>同一局域网</strong> 内才能互相连接<br>
      {{VERSION}} · <a href="https://github.com/ruccsf/quiz-buzzer" target="_blank">GitHub</a>
    </div>
  </div>
</body>
</html>
