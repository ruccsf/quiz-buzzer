<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
  <title>大屏展示 - 知识竞赛</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ======== 大屏全局 ======== */
    body {
      background: linear-gradient(135deg, #0a0e27 0%, #141838 50%, #1a1040 100%);
      user-select: none;
    }

    /* ===== Phase 1: 加入界面 ===== */
    .screen-join-view {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .screen-join-view .join-card {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      max-width: 420px;
      width: 100%;
      box-shadow: 0 16px 64px rgba(0,0,0,0.4);
    }
    .screen-join-view .join-card .icon { font-size: 48px; line-height: 1; margin-bottom: 12px; }
    .screen-join-view .join-card .form-group { margin-bottom: 20px; }
    .screen-join-view .join-card .form-group label { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; display: block; }
    .join-tip {
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 20px;
      text-align: center;
      line-height: 1.6;
    }

    /* ===== Phase 2: 大屏展示 ===== */
    .screen-display {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 40px 16px;
      overflow: hidden;
    }

    /* ---- 顶栏 ---- */
    .screen-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .screen-header .game-title {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #4a9eff, #7c4dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .screen-header .meta-info {
      font-size: 20px;
      color: var(--text-secondary);
      font-weight: 600;
    }
    .screen-header .meta-info .room-code {
      color: var(--text-primary);
      letter-spacing: 2px;
      margin-right: 16px;
    }
    .screen-header .meta-info .round-info {
      background: var(--bg-card);
      padding: 6px 16px;
      border-radius: 8px;
    }
    .copy-btn {
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 4px;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      padding: 1px 6px;
      transition: all 0.2s;
      margin-left: 6px;
      vertical-align: middle;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.15); color: var(--text-primary); }
    .qr-trigger { cursor: pointer; font-size: 18px; margin-left: 6px; opacity: 0.6; vertical-align: middle; transition: opacity 0.2s; }
    .qr-trigger:hover { opacity: 1; }
    .qr-popup {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(5, 5, 30, 0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999; animation: fadeIn 0.2s ease;
    }
    .qr-popup.hidden { display: none; }
    .qr-popup .qr-title { font-size: 36px; font-weight: 800; color: #fff; margin-bottom: 8px; }
    .qr-popup .qr-sub { font-size: 18px; color: rgba(255,255,255,0.6); margin-bottom: 24px; }
    .qr-popup .qr-code-box { background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 0 60px rgba(74,158,255,0.3); margin-bottom: 20px; }
    .qr-popup .qr-tip { font-size: 20px; color: var(--accent-blue); font-weight: 600; }
    .qr-popup .qr-close { margin-top: 12px; background: none; border: none; color: rgba(255,255,255,0.5); font-size: 14px; cursor: pointer; }
    .qr-popup .qr-close:hover { color: #fff; }

    /* ---- 大屏主持人控制的二维码 ---- */
    .qr-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(5, 5, 30, 0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 900;
      animation: fadeIn 0.3s ease;
    }
    .qr-overlay.hidden { display: none; }
    .qr-overlay .qr-title {
      font-size: 36px; font-weight: 800; color: #fff;
      margin-bottom: 8px;
    }
    .qr-overlay .qr-sub {
      font-size: 18px; color: rgba(255,255,255,0.6);
      margin-bottom: 24px;
    }
    .qr-overlay .qr-code-box {
      background: #fff; padding: 20px; border-radius: 20px;
      box-shadow: 0 0 60px rgba(74,158,255,0.3);
      margin-bottom: 20px;
    }
    .qr-overlay .qr-tip {
      font-size: 20px; color: var(--accent-blue);
      font-weight: 600;
    }

    /* ---- 紧凑状态横条 ---- */
    .screen-status {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 6px 16px;
      padding: 8px 0;
      min-height: 0;
    }
    .status-big-text {
      font-size: 22px;
      font-weight: 700;
      transition: all 0.3s;
      white-space: nowrap;
      flex-shrink: 0;
      padding: 4px 0;
    }
    .status-big-text.idle { color: var(--text-secondary); }
    .status-big-text.open { color: var(--accent-yellow); animation: pulse 1s infinite; }
    .status-big-text.locked { color: var(--accent-green); }
    .status-big-text.resolved { color: var(--accent-blue); }

    .timer-big {
      font-size: 36px;
      font-weight: 800;
      min-width: 40px;
      text-align: center;
      flex-shrink: 0;
    }
    .timer-big.running { color: var(--accent-yellow); }
    .timer-big.warning { color: var(--accent-red); animation: pulse 0.5s infinite; }
    .timer-big.idle { color: var(--text-secondary); }

    /* ---- 大屏题目展示（独立占行） ---- */
    .screen-question {
      width: 100%;
      padding: 10px 20px;
      background: rgba(74, 158, 255, 0.06);
      border: 1px solid rgba(74, 158, 255, 0.15);
      border-radius: 10px;
      font-size: 28px;
      font-weight: 700;
      color: var(--accent-yellow);
      line-height: 1.5;
      word-break: break-word;
      animation: fadeIn 0.4s ease;
      margin-top: 4px;
    }
    .screen-question.hidden { display: none; }
    .screen-question .sq-answer {
      display: block;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 2px solid rgba(0, 230, 118, 0.25);
      font-size: 26px;
      font-weight: 700;
      color: var(--accent-green);
    }

    /* ======== 竖向排行榜（TV风格列表） ======== */
    .leaderboard {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 0;
      min-height: 0;
      overflow: hidden;
      gap: 6px;
    }
    .lb-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.5s ease, border-color 0.3s, box-shadow 0.3s;
      position: relative;
      flex-shrink: 0;
      backdrop-filter: blur(6px);
    }
    .lb-row[data-rank="1"] { width: 88%; padding: 16px 24px; }
    .lb-row[data-rank="2"] { width: 84%; padding: 14px 22px; }
    .lb-row[data-rank="3"] { width: 80%; padding: 12px 20px; }
    .lb-row[data-rank="4"],
    .lb-row[data-rank="5"],
    .lb-row[data-rank="6"],
    .lb-row[data-rank="7"],
    .lb-row[data-rank="8"] { width: 76%; padding: 10px 18px; }

    .lb-row.buzzed {
      border-color: var(--accent-yellow);
      box-shadow: 0 0 30px rgba(255,214,0,0.2);
      background: linear-gradient(135deg, rgba(255,214,0,0.08) 0%, rgba(255,214,0,0.01) 100%);
    }
    .lb-row.correct {
      border-color: var(--accent-green);
      box-shadow: 0 0 30px rgba(0,230,118,0.2);
      background: linear-gradient(135deg, rgba(0,230,118,0.08) 0%, rgba(0,230,118,0.01) 100%);
    }
    .lb-row.wrong {
      border-color: var(--accent-red);
      box-shadow: 0 0 30px rgba(255,23,68,0.2);
      animation: shake 0.5s ease;
    }

    /* ---- 排名徽章 ---- */
    .lb-rank {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .lb-row[data-rank="1"] .lb-rank { width: 48px; height: 48px; font-size: 24px; }
    .lb-row[data-rank="2"] .lb-rank { width: 42px; height: 42px; font-size: 22px; }
    .lb-row[data-rank="3"] .lb-rank { width: 38px; height: 38px; font-size: 20px; }
    .lb-row[data-rank="4"] .lb-rank,
    .lb-row[data-rank="5"] .lb-rank,
    .lb-row[data-rank="6"] .lb-rank,
    .lb-row[data-rank="7"] .lb-rank,
    .lb-row[data-rank="8"] .lb-rank { width: 34px; height: 34px; font-size: 18px; background: rgba(255,255,255,0.04); color: var(--text-secondary); }
    .lb-rank.gold { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; box-shadow: 0 0 16px rgba(255,215,0,0.4); }
    .lb-rank.silver { background: linear-gradient(135deg, #e0e0e0, #b0b0b0); color: #000; box-shadow: 0 0 12px rgba(192,192,192,0.3); }
    .lb-rank.bronze { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #fff; box-shadow: 0 0 12px rgba(205,127,50,0.3); }

    /* ---- 头像容器（用于定位皇冠） ---- */
    .lb-avatar-wrap { position: relative; flex-shrink: 0; display: flex; }
    .lb-avatar { border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.12); }
    .lb-avatar-placeholder { border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 700; border: 2px solid rgba(255,255,255,0.08); }
    .lb-row[data-rank="1"] .lb-avatar, .lb-row[data-rank="1"] .lb-avatar-placeholder { width: 72px; height: 72px; font-size: 28px; }
    .lb-row[data-rank="2"] .lb-avatar, .lb-row[data-rank="2"] .lb-avatar-placeholder { width: 60px; height: 60px; font-size: 24px; }
    .lb-row[data-rank="3"] .lb-avatar, .lb-row[data-rank="3"] .lb-avatar-placeholder { width: 52px; height: 52px; font-size: 20px; }
    .lb-row[data-rank="4"] .lb-avatar, .lb-row[data-rank="4"] .lb-avatar-placeholder,
    .lb-row[data-rank="5"] .lb-avatar, .lb-row[data-rank="5"] .lb-avatar-placeholder,
    .lb-row[data-rank="6"] .lb-avatar, .lb-row[data-rank="6"] .lb-avatar-placeholder,
    .lb-row[data-rank="7"] .lb-avatar, .lb-row[data-rank="7"] .lb-avatar-placeholder,
    .lb-row[data-rank="8"] .lb-avatar, .lb-row[data-rank="8"] .lb-avatar-placeholder { width: 44px; height: 44px; font-size: 18px; }

    /* ---- 选手名 ---- */
    .lb-name { flex: 1; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .lb-row[data-rank="1"] .lb-name { font-size: 28px; }
    .lb-row[data-rank="2"] .lb-name { font-size: 24px; }
    .lb-row[data-rank="3"] .lb-name { font-size: 22px; }
    .lb-row[data-rank="4"] .lb-name, .lb-row[data-rank="5"] .lb-name,
    .lb-row[data-rank="6"] .lb-name, .lb-row[data-rank="7"] .lb-name,
    .lb-row[data-rank="8"] .lb-name { font-size: 18px; }

    /* ---- 分数 ---- */
    .lb-score { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .lb-score-val { font-weight: 800; text-align: right; text-shadow: 0 0 16px currentColor; }
    .lb-row[data-rank="1"] .lb-score-val { font-size: 32px; min-width: 56px; }
    .lb-row[data-rank="2"] .lb-score-val { font-size: 28px; min-width: 48px; }
    .lb-row[data-rank="3"] .lb-score-val { font-size: 24px; min-width: 42px; }
    .lb-row[data-rank="4"] .lb-score-val, .lb-row[data-rank="5"] .lb-score-val,
    .lb-row[data-rank="6"] .lb-score-val, .lb-row[data-rank="7"] .lb-score-val,
    .lb-row[data-rank="8"] .lb-score-val { font-size: 20px; min-width: 36px; }

    .lb-change { font-size: 14px; font-weight: 700; opacity: 0; transition: opacity 0.3s; min-width: 34px; text-align: left; }
    .lb-change.visible { opacity: 1; animation: scorePopup 0.4s ease; }
    .lb-change.positive { color: var(--accent-green); }
    .lb-change.negative { color: var(--accent-red); }
    @keyframes scorePopup { 0% { transform: scale(0.5) translateY(6px); opacity: 0; } 60% { transform: scale(1.2) translateY(-3px); } 100% { transform: scale(1) translateY(0); opacity: 1; } }

    /* ---- 在线指示器 ---- */
    .lb-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .lb-dot.online { background: var(--accent-green); box-shadow: 0 0 10px rgba(0,230,118,0.8); }
    .lb-dot.offline { background: #555; }

    /* ---- 抢到徽章 ---- */
    .lb-row .buzz-badge { display: none; position: absolute; top: -8px; right: -8px; background: linear-gradient(135deg, #ffd000, #ff8c00); color: #000; font-size: 12px; font-weight: 700; padding: 2px 12px; border-radius: 20px; white-space: nowrap; box-shadow: 0 2px 12px rgba(255,214,0,0.5); }
    .lb-row.buzzed .buzz-badge { display: block; }

    /* ---- 第1名皇冠（定位在头像上方） ---- */
    .lb-crown {
      position: absolute;
      top: -26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 30px;
      line-height: 1;
      animation: crownBounce 2s ease-in-out infinite;
      pointer-events: none;
      filter: drop-shadow(0 2px 8px rgba(255,215,0,0.6));
      z-index: 2;
    }
    @keyframes crownBounce {
      0%, 100% { transform: translateX(-50%) translateY(0) rotate(-3deg); }
      25% { transform: translateX(-50%) translateY(-5px) rotate(-1deg); }
      50% { transform: translateX(-50%) translateY(0) rotate(3deg); }
      75% { transform: translateX(-50%) translateY(-3px) rotate(1deg); }
    }

    .lb-empty { color: var(--text-secondary); font-size: 20px; text-align: center; padding: 24px; }

    /* ---- 底部事件条 ---- */
    .screen-footer {
      flex-shrink: 0;
      margin-top: 8px;
      padding: 8px 0;
    }
    .event-log {
      display: flex;
      gap: 16px;
      overflow: hidden;
      font-size: 16px;
      color: var(--text-secondary);
      height: 28px;
      align-items: center;
    }
    .event-log .entry {
      white-space: nowrap;
      animation: fadeIn 0.5s ease;
    }
    .event-log .highlight {
      color: var(--accent-yellow);
      font-weight: 600;
    }

    /* ---- 警告横幅 ---- */
    .warning-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255,23,68,0.9);
      color: #fff;
      text-align: center;
      padding: 12px;
      font-size: 18px;
      font-weight: 700;
      z-index: 100;
      animation: slideDown 0.3s ease;
    }
    .warning-banner.hidden { display: none; }

    /* ---- 通用隐藏 ---- */
    .hidden { display: none !important; }

    /* ---- 撒花效果 ---- */
    .confetti-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }
    .confetti {
      position: absolute;
      width: 10px; height: 10px;
      opacity: 0;
      animation: confettiFall 2.5s ease-out forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ---- 动画补充 ---- */
    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }

    /* ---- 响应式 ---- */
    @media (max-width: 768px) {
      .screen-display { padding: 10px 12px; }
      .screen-header .game-title { font-size: 20px; }
      .screen-header .meta-info { font-size: 14px; }
      .screen-status { gap: 4px; }
      .status-big-text { font-size: 15px; }
      .timer-big { font-size: 22px; }
      .screen-question { font-size: 18px; padding: 8px 14px; }
      .leaderboard { gap: 4px; }
      .lb-row[data-rank="1"] { width: 94%; padding: 12px 16px; gap: 10px; }
      .lb-row[data-rank="1"] .lb-rank { width: 36px; height: 36px; font-size: 18px; }
      .lb-row[data-rank="1"] .lb-avatar, .lb-row[data-rank="1"] .lb-avatar-placeholder { width: 50px; height: 50px; font-size: 20px; }
      .lb-row[data-rank="1"] .lb-name { font-size: 20px; }
      .lb-row[data-rank="1"] .lb-score-val { font-size: 24px; min-width: 40px; }
      .lb-row[data-rank="2"] { width: 92%; padding: 10px 14px; gap: 8px; }
      .lb-row[data-rank="2"] .lb-rank { width: 32px; height: 32px; font-size: 16px; }
      .lb-row[data-rank="2"] .lb-avatar, .lb-row[data-rank="2"] .lb-avatar-placeholder { width: 42px; height: 42px; font-size: 17px; }
      .lb-row[data-rank="2"] .lb-name { font-size: 18px; }
      .lb-row[data-rank="2"] .lb-score-val { font-size: 20px; min-width: 36px; }
      .lb-row[data-rank="3"] { width: 90%; padding: 8px 12px; gap: 6px; }
      .lb-row[data-rank="3"] .lb-rank { width: 28px; height: 28px; font-size: 15px; }
      .lb-row[data-rank="3"] .lb-avatar, .lb-row[data-rank="3"] .lb-avatar-placeholder { width: 36px; height: 36px; font-size: 14px; }
      .lb-row[data-rank="3"] .lb-name { font-size: 16px; }
      .lb-row[data-rank="3"] .lb-score-val { font-size: 18px; min-width: 32px; }
      .lb-row[data-rank="4"], .lb-row[data-rank="5"], .lb-row[data-rank="6"],
      .lb-row[data-rank="7"], .lb-row[data-rank="8"] { width: 88%; padding: 6px 10px; gap: 6px; }
      .lb-row[data-rank="4"] .lb-rank, .lb-row[data-rank="5"] .lb-rank,
      .lb-row[data-rank="6"] .lb-rank, .lb-row[data-rank="7"] .lb-rank,
      .lb-row[data-rank="8"] .lb-rank { width: 26px; height: 26px; font-size: 13px; }
      .lb-row[data-rank="4"] .lb-avatar, .lb-row[data-rank="4"] .lb-avatar-placeholder,
      .lb-row[data-rank="5"] .lb-avatar, .lb-row[data-rank="5"] .lb-avatar-placeholder,
      .lb-row[data-rank="6"] .lb-avatar, .lb-row[data-rank="6"] .lb-avatar-placeholder,
      .lb-row[data-rank="7"] .lb-avatar, .lb-row[data-rank="7"] .lb-avatar-placeholder,
      .lb-row[data-rank="8"] .lb-avatar, .lb-row[data-rank="8"] .lb-avatar-placeholder { width: 30px; height: 30px; font-size: 12px; }
      .lb-row[data-rank="4"] .lb-name, .lb-row[data-rank="5"] .lb-name,
      .lb-row[data-rank="6"] .lb-name, .lb-row[data-rank="7"] .lb-name,
      .lb-row[data-rank="8"] .lb-name { font-size: 14px; }
      .lb-row[data-rank="4"] .lb-score-val, .lb-row[data-rank="5"] .lb-score-val,
      .lb-row[data-rank="6"] .lb-score-val, .lb-row[data-rank="7"] .lb-score-val,
      .lb-row[data-rank="8"] .lb-score-val { font-size: 15px; min-width: 28px; }
    }
    @media (max-width: 400px) {
      .screen-display { padding: 6px; }
      .lb-row[data-rank="1"] { width: 98%; padding: 10px 12px; gap: 6px; }
      .lb-row[data-rank="1"] .lb-rank { width: 30px; height: 30px; font-size: 15px; }
      .lb-row[data-rank="1"] .lb-avatar, .lb-row[data-rank="1"] .lb-avatar-placeholder { width: 40px; height: 40px; font-size: 16px; }
      .lb-row[data-rank="1"] .lb-name { font-size: 16px; }
      .lb-row[data-rank="1"] .lb-score-val { font-size: 18px; min-width: 30px; }
      .lb-row[data-rank="2"] { width: 96%; padding: 8px 10px; gap: 5px; }
      .lb-row[data-rank="2"] .lb-avatar, .lb-row[data-rank="2"] .lb-avatar-placeholder { width: 34px; height: 34px; font-size: 14px; }
      .lb-row[data-rank="2"] .lb-name { font-size: 14px; }
      .lb-row[data-rank="2"] .lb-score-val { font-size: 16px; min-width: 28px; }
      .lb-row[data-rank="3"], .lb-row[data-rank="4"], .lb-row[data-rank="5"],
      .lb-row[data-rank="6"], .lb-row[data-rank="7"], .lb-row[data-rank="8"] { width: 94%; padding: 6px 8px; gap: 4px; }
      .lb-row[data-rank="3"] .lb-avatar, .lb-row[data-rank="3"] .lb-avatar-placeholder,
      .lb-row[data-rank="4"] .lb-avatar, .lb-row[data-rank="4"] .lb-avatar-placeholder,
      .lb-row[data-rank="5"] .lb-avatar, .lb-row[data-rank="5"] .lb-avatar-placeholder,
      .lb-row[data-rank="6"] .lb-avatar, .lb-row[data-rank="6"] .lb-avatar-placeholder,
      .lb-row[data-rank="7"] .lb-avatar, .lb-row[data-rank="7"] .lb-avatar-placeholder,
      .lb-row[data-rank="8"] .lb-avatar, .lb-row[data-rank="8"] .lb-avatar-placeholder { width: 28px; height: 28px; font-size: 11px; }
      .lb-row[data-rank="3"] .lb-name, .lb-row[data-rank="4"] .lb-name,
      .lb-row[data-rank="5"] .lb-name, .lb-row[data-rank="6"] .lb-name,
      .lb-row[data-rank="7"] .lb-name, .lb-row[data-rank="8"] .lb-name { font-size: 12px; }
      .lb-row[data-rank="3"] .lb-score-val, .lb-row[data-rank="4"] .lb-score-val,
      .lb-row[data-rank="5"] .lb-score-val, .lb-row[data-rank="6"] .lb-score-val,
      .lb-row[data-rank="7"] .lb-score-val, .lb-row[data-rank="8"] .lb-score-val { font-size: 13px; min-width: 22px; }
    }
  </style>
</head>
<body>
  <!-- ===== Phase 1: 加入房间 ===== -->
  <div class="screen-join-view" id="joinView">
    <div class="join-card" style="padding:32px 40px;">
      <div style="text-align:center;margin-bottom:20px;">
        <div class="icon">📺</div>
        <div style="font-size:15px;color:var(--text-secondary);margin-top:4px;">输入房间号连接大屏</div>
      </div>
      <div class="form-group">
        <label>房间号</label>
        <div class="input-group">
          <input class="form-input code-input" id="roomCodeInput" type="text" placeholder="XXXX" maxlength="4" autocomplete="off">
          <button class="paste-btn" onclick="pasteText('roomCodeInput',this)" title="从剪贴板粘贴">📥</button>
        </div>
      </div>
      <button class="btn btn-primary" id="connectBtn">📺 连接大屏</button>
      <div class="join-tip">
        电视/投影仪打开此页面<br>
        确保与服务器在 <strong>同一局域网</strong> 内
      </div>
    </div>
    <div style="margin-top:16px;color:var(--text-secondary);font-size:13px;">
      <a href="/" style="color:var(--accent-blue);text-decoration:none;">← 返回首页</a>
    </div>
  </div>

  <!-- ===== Phase 2: 大屏展示 ===== -->
  <div class="screen-display hidden" id="displayView">
    <div class="screen-header">
      <div class="game-title" id="gameTitle">🏆 知识竞赛</div>
      <div class="meta-info">
        <span class="room-code" id="roomCodeLabel">房间: ----</span><button class="copy-btn" onclick="copyText(document.getElementById('roomCodeLabel').textContent.replace('房间: ',''), this)" title="复制房间号">📋</button><span class="qr-trigger" onclick="showQR()" title="扫码加入">📱</span>
        <span class="round-info" id="roundLabel">第 0 题</span>
      </div>
    </div>

    <div class="screen-status">
      <div class="status-big-text idle" id="statusBigText">等待开始抢答</div>
      <div class="timer-big idle" id="timerBig">--</div>
      <div class="screen-question hidden" id="screenQuestion"></div>
    </div>

    <div class="leaderboard" id="leaderboard">
      <div class="lb-empty">暂无选手加入</div>
    </div>

    <div class="screen-footer">
      <div class="event-log" id="eventLog">
        <span class="entry">等待比赛开始…</span>
      </div>
      <div style="text-align:center;margin-top:6px;">
        <span onclick="showQR()" style="color:var(--accent-blue);font-size:13px;cursor:pointer;text-decoration:none;">📱 扫码加入</span>
        <span style="color:var(--text-secondary);margin:0 8px;">·</span>
        <a href="/" style="color:var(--text-secondary);font-size:13px;text-decoration:none;">← 返回首页</a>
      </div>
    </div>
  </div>

  <!-- 二维码弹窗（手动点击触发） -->
  <div class="qr-popup hidden" id="qrPopup">
    <div class="qr-title">📱 扫码加入</div>
    <div class="qr-sub">打开手机相机扫描二维码</div>
    <div class="qr-code-box" id="popupQRCode"></div>
    <div class="qr-tip" id="qrUrlDisplay"></div>
    <button class="qr-close" onclick="closeQR()">关闭</button>
  </div>

  <!-- 主持人控制的全屏二维码 -->
  <div class="qr-overlay hidden" id="qrOverlay">
    <div class="qr-title">📱 扫码加入</div>
    <div class="qr-sub">打开手机相机扫描二维码</div>
    <div class="qr-code-box" id="qrOverlayCode"></div>
    <div class="qr-tip" id="qrOverlayRoom"></div>
  </div>

  <!-- 警告横幅 -->
  <div class="warning-banner hidden" id="warningBanner">⚠️ 主持人已断开连接</div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/socket-client.js"></script>
  <script src="/js/qrcode.min.js"></script>
  <script>
    // ======== 状态 ========
    let roomCode = null;
    let contestants = [];
    let currentState = 'idle';
    let currentBuzzer = null;
    let currentRound = 0;
    let eventEntries = [];
    let prevScores = {}; // 记录上一次分数，用于显示变化
    let serverIp = 'localhost';
    let serverPort = 3000;

    fetch('/api/server-info').then(r => r.json()).then(info => {
      serverIp = info.ip; serverPort = info.port;
    }).catch(() => {});

    function getQRUrl(code) { return 'http://' + serverIp + ':' + serverPort + '/player?room=' + code; }

    function showQR() {
      if (!roomCode) return;
      const popup = $('#qrPopup');
      const container = $('#popupQRCode');
      container.innerHTML = '';
      if (typeof QRCode !== 'undefined') {
        new QRCode(container, { text: getQRUrl(roomCode), width: 260, height: 260, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
      }
      $('#qrUrlDisplay').textContent = '房间号: ' + roomCode;
      popup.classList.remove('hidden');
    }

    function closeQR() { $('#qrPopup').classList.add('hidden'); }

    // ======== Phase 1: 加入 ========
    const codeInput = $('#roomCodeInput');
    codeInput.addEventListener('input', () => {
      codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    });
    codeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') $('#connectBtn').click();
    });

    $('#connectBtn').addEventListener('click', () => {
      const code = codeInput.value.trim();
      if (!code || code.length !== 4) return showToast('请输入4位房间号');

      $('#connectBtn').disabled = true;
      $('#connectBtn').textContent = '连接中...';

      socket.emit('join-screen', { roomCode: code }, (res) => {
        $('#connectBtn').disabled = false;
        $('#connectBtn').textContent = '📺 连接大屏';

        if (!res.ok) return showToast(res.error);

        roomCode = code;
        const room = res.room;

        // 切换到展示模式
        $('#joinView').classList.add('hidden');
        $('#displayView').classList.remove('hidden');

        // 填充初始数据
        $('#gameTitle').textContent = '🏆 ' + (room.gameName || '知识竞赛');
        $('#roomCodeLabel').textContent = '房间: ' + room.id;
        currentRound = room.round || 0;
        $('#roundLabel').textContent = '第 ' + currentRound + ' 题';

        contestants = room.contestants || [];
        currentState = room.state || 'idle';
        currentBuzzer = room.currentBuzzer;

        // 显示已有题目
        if (room.currentQuestion && room.currentQuestion.trim()) {
          let html = '📝 ' + room.currentQuestion;
          if (room.currentAnswer && room.currentAnswer.trim()) {
            html += '<span class="sq-answer">💡 ' + room.currentAnswer + '</span>';
          }
          $('#screenQuestion').innerHTML = html;
          $('#screenQuestion').classList.remove('hidden');
        }

        renderLeaderboard();
        updateStatusUI(currentState, currentBuzzer, room.timerRemaining);
        if (currentState === 'open' && room.timerRemaining > 0) {
          updateTimer(room.timerRemaining);
        }

        addEventLog('📡 已连接大屏');
      });
    });

    // ======== Socket 事件 ========

    socket.on('question-update', ({ question }) => {
      const el = $('#screenQuestion');
      if (question && question.trim()) {
        playSound('publish');
        el.innerHTML = '📝 ' + question;
        el.classList.remove('hidden');
      } else {
        el.innerHTML = '';
        el.classList.add('hidden');
      }
    });

    socket.on('buzzer-state', ({ state, winner, remaining }) => {
      currentState = state;
      currentBuzzer = winner;
      updateStatusUI(state, winner, remaining);
      if (state === 'open' && remaining) updateTimer(remaining);
      if (state === 'idle') {
        updateTimer(null);
        clearHighlights();
        // 清除判定后的状态文本
        const se = $('#statusBigText');
        se.textContent = '⏸️ 等待开始抢答';
        se.className = 'status-big-text idle';
      }
    });

    socket.on('buzz-result', ({ winnerId, winnerName }) => {
      highlightRow(winnerId, 'buzzed');
      playSound('buzz');
      addEventLog('🏆 ' + winnerName + ' 抢答成功！', true);
    });

    socket.on('judge-result', ({ correct, contestantId, delta, answer }) => {
      highlightRow(contestantId, correct ? 'correct' : 'wrong');
      playSound(correct ? 'correct' : 'wrong');
      setTimeout(() => {
        $$('.lb-row').forEach(c => { c.classList.remove('correct', 'wrong'); });
      }, 2500);

      // 更新大状态文本
      const statusEl = $('#statusBigText');
      const buzzerName = currentBuzzer?.name || '选手';
      if (correct) {
        statusEl.textContent = '✅ ' + buzzerName + ' 回答正确！+' + delta + '分';
        statusEl.className = 'status-big-text resolved';
        // 🎉 撒花效果
        launchConfetti();
      } else {
        statusEl.textContent = '❌ ' + buzzerName + ' 回答错误 ' + delta + '分';
        statusEl.className = 'status-big-text resolved';
      }

      addEventLog(correct
        ? '✅ 回答正确 +' + delta + '分'
        : '❌ 回答错误 ' + delta + '分');

      // 公布答案
      if (answer) {
        const el = $('#screenQuestion');
        let html = el.innerHTML;
        // 如果有已有答案行则替换，否则追加
        if (html.includes('<span class="sq-answer"')) {
          html = html.replace(/<span class="sq-answer">.*<\/span>/, '<span class="sq-answer">💡 ' + answer + '</span>');
        } else {
          html += '<span class="sq-answer">💡 ' + answer + '</span>';
        }
        el.innerHTML = html;
        el.classList.remove('hidden');
      }
    });

    socket.on('score-update', ({ contestants: updated }) => {
      if (updated) contestants = updated;
      renderLeaderboard();
    });

    socket.on('avatar-updated', () => {
      refreshRoom();
    });

    // ---- 主持人控制二维码显隐 ----
    let qrOverlayVisible = false;

    socket.on('qr-visibility', ({ show }) => {
      const overlay = $('#qrOverlay');
      if (show) {
        const container = $('#qrOverlayCode');
        container.innerHTML = '';
        if (typeof QRCode !== 'undefined' && roomCode) {
          new QRCode(container, { text: getQRUrl(roomCode), width: 260, height: 260, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
        }
        $('#qrOverlayRoom').textContent = '房间号: ' + roomCode;
        overlay.classList.remove('hidden');
      } else {
        overlay.classList.add('hidden');
      }
      qrOverlayVisible = show;
    });

    socket.on('timer-tick', ({ remaining }) => {
      updateTimer(remaining);
      if (remaining > 0) playSound(remaining <= 3 ? 'tickWarn' : 'tick');
    });

    socket.on('contestant-joined', ({ contestant }) => {
      playSound('join');
      refreshRoom();
      addEventLog('🎉 ' + contestant.name + ' 加入比赛');
    });

    socket.on('contestant-left', () => {
      refreshRoom();
    });

    socket.on('contestant-rejoined', ({ name }) => {
      playSound('join');
      refreshRoom();
    });

    socket.on('contestant-status', ({ contestantId, connected }) => {
      $$('.lb-row').forEach(row => {
        if (row.dataset.id === contestantId) {
          const dot = row.querySelector('.lb-dot');
          if (dot) dot.className = 'lb-dot ' + (connected ? 'online' : 'offline');
        }
      });
    });

    socket.on('host-disconnected', () => {
      $('#warningBanner').classList.remove('hidden');
      setTimeout(() => $('#warningBanner').classList.add('hidden'), 5000);
      addEventLog('⚠️ 主持人已断开连接');
      // 回到空闲状态
      currentState = 'idle';
      currentBuzzer = null;
      updateStatusUI('idle', null, 0);
      updateTimer(null);
      clearHighlights();
    });

    // 断线重连
    socket.on('connect', () => {
      if (roomCode) {
        socket.emit('join-screen', { roomCode }, (res) => {
          if (res.ok) {
            showToast('🔗 已重连');
            const room = res.room;
            contestants = room.contestants || [];
            currentState = room.state || 'idle';
            currentBuzzer = room.currentBuzzer;
            currentRound = room.round || 0;
            $('#roundLabel').textContent = '第 ' + currentRound + ' 题';
            // 恢复题目显示
            if (room.currentQuestion && room.currentQuestion.trim()) {
              $('#screenQuestion').textContent = '📝 ' + room.currentQuestion;
              $('#screenQuestion').classList.remove('hidden');
            } else {
              $('#screenQuestion').classList.add('hidden');
            }
            renderLeaderboard();
            updateStatusUI(currentState, currentBuzzer, room.timerRemaining);
            if (currentState === 'open' && room.timerRemaining > 0) {
              updateTimer(room.timerRemaining);
            }
            addEventLog('🔗 已重新连接');
          }
        });
      }
    });

    // ======== UI 函数 ========

    function updateStatusUI(state, winner, remaining) {
      const el = $('#statusBigText');
      const timerEl = $('#timerBig');

      switch (state) {
        case 'open':
          el.textContent = '🔴 抢答中！';
          el.className = 'status-big-text open';
          break;
        case 'locked':
          el.textContent = '🏆 ' + (winner?.name || '选手') + ' 抢到！等待判定…';
          el.className = 'status-big-text locked';
          timerEl.className = 'timer-big idle';
          timerEl.textContent = '--';
          break;
        case 'resolved':
          el.textContent = '⏳ 等待下一题...';
          el.className = 'status-big-text resolved';
          timerEl.className = 'timer-big idle';
          timerEl.textContent = '--';
          break;
        default:
          el.textContent = '⏸️ 等待开始抢答';
          el.className = 'status-big-text idle';
          timerEl.className = 'timer-big idle';
          timerEl.textContent = '--';
          break;
      }

      // 轮次
      if (state === 'open' || state === 'locked' || state === 'resolved') {
        // 不在此处更新轮次，round 由事件携带或 refreshRoom 更新
      }
    }

    function updateTimer(remaining) {
      const el = $('#timerBig');
      if (remaining === undefined || remaining === null) {
        el.textContent = '--';
        el.className = 'timer-big idle';
        return;
      }
      el.textContent = remaining;
      el.className = remaining <= 3 ? 'timer-big warning' : 'timer-big running';
    }

    function renderLeaderboard() {
      const container = $('#leaderboard');
      if (!contestants || contestants.length === 0) {
        container.innerHTML = '<div class="lb-empty">暂无选手加入</div>';
        return;
      }

      // FLIP: 快照旧位置
      const oldRects = new Map();
      container.querySelectorAll('.lb-row').forEach(el => {
        const id = el.dataset.id;
        if (id) oldRects.set(id, el.getBoundingClientRect().top);
      });

      const sorted = [...contestants].sort((a, b) => b.score - a.score);

      // 计算同分名次（同分同排名，后面跳号）
      let prevScore = null;
      let rankNum = 0;
      const withRank = sorted.map((c, i) => {
        if (c.score !== prevScore) rankNum = i + 1;
        prevScore = c.score;
        return { ...c, rank: rankNum };
      });

      container.innerHTML = withRank.map((c, i) => {
        const isBuzzed = currentBuzzer && c.id === currentBuzzer.contestantId;
        const r = c.rank;
        let rankClass = '';
        let rankText = r;
        if (r === 1) { rankClass = 'gold'; rankText = '🥇'; }
        else if (r === 2) { rankClass = 'silver'; rankText = '🥈'; }
        else if (r === 3) { rankClass = 'bronze'; rankText = '🥉'; }

        const crownHtml = r === 1 ? '<span class="lb-crown">👑</span>' : '';
        const avHtml = `<div class="lb-avatar-wrap">${crownHtml}` + (c.avatar
          ? `<img class="lb-avatar" src="${c.avatar}" alt="">`
          : `<span class="lb-avatar-placeholder" style="background:${c.color}33;color:${c.color}">${c.name.charAt(0)}</span>`) + `</div>`;

        // 分数变化
        const prev = prevScores[c.id];
        let changeHtml = '';
        if (prev !== undefined && prev !== c.score) {
          const diff = c.score - prev;
          const cls = diff > 0 ? 'positive' : 'negative';
          changeHtml = `<span class="lb-change visible ${cls}">${diff > 0 ? '+' : ''}${diff}</span>`;
        } else {
          changeHtml = `<span class="lb-change"></span>`;
        }

        return `
          <div class="lb-row ${isBuzzed ? 'buzzed' : ''}" data-id="${c.id}" data-rank="${r}">
            <div class="lb-rank ${rankClass}">${rankText}</div>
            ${avHtml}
            <span class="lb-name" style="color:${c.color}">${c.name}</span>
            <div class="lb-score">
              <span class="lb-score-val" style="color:${c.color}">${c.score}</span>
              ${changeHtml}
            </div>
            <span class="lb-dot ${c.connected ? 'online' : 'offline'}"></span>
            <span class="buzz-badge">🏆 抢到</span>
          </div>
        `;
      }).join('');

      // 记录分数
      sorted.forEach(c => { prevScores[c.id] = c.score; });

      // 分数变化标签 3 秒后自动消失
      setTimeout(() => {
        container.querySelectorAll('.lb-change.visible').forEach(el => {
          el.classList.remove('visible');
        });
      }, 3000);

      // FLIP: 动画平移
      requestAnimationFrame(() => {
        container.querySelectorAll('.lb-row').forEach(el => {
          const id = el.dataset.id;
          if (oldRects.has(id)) {
            const newTop = el.getBoundingClientRect().top;
            const dy = oldRects.get(id) - newTop;
            if (Math.abs(dy) > 1) {
              el.style.transition = 'none';
              el.style.transform = `translateY(${dy}px)`;
              requestAnimationFrame(() => {
                el.style.transition = 'transform 0.5s ease';
                el.style.transform = '';
              });
            }
          }
        });
      });
    }

    function highlightRow(contestantId, type) {
      $$('.lb-row').forEach(r => {
        r.classList.remove('buzzed', 'correct', 'wrong');
        if (r.dataset.id === contestantId) r.classList.add(type);
      });
    }

    function clearHighlights() {
      $$('.lb-row').forEach(r => r.classList.remove('buzzed', 'correct', 'wrong'));
    }

    function launchConfetti() {
      const container = document.createElement('div');
      container.className = 'confetti-container';
      const colors = ['#ff1744', '#ffd600', '#00e676', '#4a9eff', '#ff6b6b', '#7c4dff', '#ff9100'];
      for (let i = 0; i < 60; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + '%';
        el.style.top = '-10px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width = (6 + Math.random() * 8) + 'px';
        el.style.height = (6 + Math.random() * 8) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationDelay = (Math.random() * 1.2).toFixed(2) + 's';
        el.style.animationDuration = (1.8 + Math.random() * 1.2).toFixed(2) + 's';
        container.appendChild(el);
      }
      document.body.appendChild(container);
      setTimeout(() => container.remove(), 4000);
    }

    function addEventLog(text, highlight) {
      eventEntries.push({ text, highlight: !!highlight });
      if (eventEntries.length > 20) eventEntries.shift();

      const log = $('#eventLog');
      log.innerHTML = eventEntries.map(e =>
        `<span class="entry ${e.highlight ? 'highlight' : ''}">${e.text}</span>`
      ).join('');
      log.scrollLeft = log.scrollWidth;
    }

    function refreshRoom() {
      if (!roomCode) return;
      socket.emit('get-room', { roomCode }, (res) => {
        if (!res.ok) return;
        contestants = res.room.contestants || [];
        currentRound = res.room.round || 0;
        $('#roundLabel').textContent = '第 ' + currentRound + ' 题';
        renderLeaderboard();
      });
    }
  </script>
</body>
</html>
